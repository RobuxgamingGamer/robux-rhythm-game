<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robux Rhythm Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      font-size: 20px;
    }

    #game {
      display: flex;
      justify-content: center;
      height: 80vh;
    }

    .lane {
      flex: 1;
      margin: 2px;
      border: 2px solid white;
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
    }

    .note {
      width: 100%;
      height: 25px;
      background: cyan;
      position: absolute;
      top: 0;
      border-radius: 6px;
    }

    .hit-line {
      position: absolute;
      bottom: 60px;
      height: 5px;
      width: 100%;
      background: red;
    }

    #score, #combo {
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>🎵 Robux Rhythm Game (Mobile Mode) 🎵</h1>
<p>Tap the lane when note hits the red line!</p>
<p id="score">Score: 0</p>
<p id="combo">Combo: 0</p>

<div id="game">
  <div class="lane" data-key="0"><div class="hit-line"></div></div>
  <div class="lane" data-key="1"><div class="hit-line"></div></div>
  <div class="lane" data-key="2"><div class="hit-line"></div></div>
  <div class="lane" data-key="3"><div class="hit-line"></div></div>
</div>

<script>
let score = 0;
let combo = 0;

// SPEED 11 🔥 (faster notes)
const speed = 8;

function spawnNote(lane) {
  let note = document.createElement("div");
  note.classList.add("note");
  lane.appendChild(note);

  let pos = 0;
  let fall = setInterval(() => {
    pos += speed;
    note.style.top = pos + "px";

    if (pos > window.innerHeight) {
      note.remove();
      combo = 0;
    }
  }, 20);

  note.dataset.interval = fall;
}

setInterval(() => {
  let lanes = document.querySelectorAll(".lane");
  let lane = lanes[Math.floor(Math.random() * lanes.length)];
  spawnNote(lane);
}, 500);

// TAP CONTROLS 👇
document.querySelectorAll(".lane").forEach((lane) => {
  lane.addEventListener("touchstart", () => {
    hitLane(lane);
  });
});

function hitLane(lane) {
  let notes = lane.querySelectorAll(".note");

  if (notes.length > 0) {
    let note = notes[0];
    let top = parseInt(note.style.top);

    // HIT WINDOW 🎯
    let hitLine = lane.clientHeight - 60;

    if (top > hitLine - 40 && top < hitLine + 40) {
      score += 100;
      combo++;
      clearInterval(note.dataset.interval);
      note.remove();
    } else {
      combo = 0;
    }
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("combo").innerText = "Combo: " + combo;
}
</script>

</body>
</html>
