<!DOCTYPE html>
<html>
<head>
  <title>Robux Rhythm Game</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    .lane {
      display: inline-block;
      width: 80px;
      height: 400px;
      border: 2px solid white;
      margin: 5px;
      position: relative;
      overflow: hidden;
    }
    .note {
      width: 100%;
      height: 20px;
      background: cyan;
      position: absolute;
      top: 0;
    }
    .hit-zone {
      position: absolute;
      bottom: 0;
      height: 40px;
      width: 100%;
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>
<h1>🎵 Robux Rhythm Game 🎵</h1>
<p>Keys: D F J K</p>
<p id="score">Score: 0</p>
<p id="combo">Combo: 0</p>

<div id="game">
  <div class="lane" data-key="d"></div>
  <div class="lane" data-key="f"></div>
  <div class="lane" data-key="j"></div>
  <div class="lane" data-key="k"></div>
</div>

<script>
let score = 0;
let combo = 0;

function spawnNote(lane) {
  let note = document.createElement("div");
  note.classList.add("note");
  lane.appendChild(note);

  let pos = 0;
  let fall = setInterval(() => {
    pos += 4;
    note.style.top = pos + "px";

    if (pos > 360) {
      note.remove();
      combo = 0;
    }
  }, 20);

  note.dataset.interval = fall;
}

setInterval(() => {
  let lanes = document.querySelectorAll(".lane");
  let lane = lanes[Math.floor(Math.random() * lanes.length)];
  spawnNote(lane);
}, 800);

document.addEventListener("keydown", (e) => {
  let lanes = document.querySelectorAll(".lane");
  lanes.forEach(lane => {
    if (lane.dataset.key === e.key) {
      let notes = lane.querySelectorAll(".note");
      if (notes.length > 0) {
        let note = notes[0];
        let top = parseInt(note.style.top);

        if (top > 300 && top < 380) {
          score += 100;
          combo++;
          clearInterval(note.dataset.interval);
          note.remove();
        }
      }
    }
  });

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("combo").innerText = "Combo: " + combo;
});
</script>
</body>
</html>
